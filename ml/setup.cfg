[flake8]
max-line-length = 88
extend-ignore = E203, W503
exclude = 
    .git,
    __pycache__,
    venv,
    .venv,
    env,
    .env,
    *.egg-info,
    build,
    dist,
    .tox

[tool:isort]
profile = black
multi_line_output = 3
line_length = 88
known_first_party = 
known_third_party = 
    numpy,
    sklearn,
    PIL,
    joblib,
    certifi

[pycodestyle]
max-line-length = 88
ignore = E203, W503