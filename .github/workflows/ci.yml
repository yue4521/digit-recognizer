---
name: CI

on:
  push:
    branches: [main, master, task]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
        python-version: [3.8, 3.9, '3.10']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Node.js dependencies
        run: |
          npm install --prefix server --no-optional
          npm install --prefix client --no-optional

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml/requirements.txt

      - name: Lint JavaScript/TypeScript
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Lint Python
        run: npm run lint:python

      - name: Build application
        run: npm run build

      - name: Train model (quick test)
        run: npm run train-model
        env:
          PYTHONPATH: ${{ github.workspace }}/ml
